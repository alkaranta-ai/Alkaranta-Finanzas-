<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alkaranta Silver — Personal Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#C0C0C0">
    <style>
        :root {
            --silver: #C0C0C0;
            --platinum: #E5E4E2;
            --charcoal: #1A1A1A;
            --white: #FFFFFF;
            --accent: #2F2F2F;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--platinum); color: var(--charcoal); min-height: 100vh; }
        
        header { background: var(--charcoal); color: var(--silver); padding: 30px 20px; text-align: center; border-bottom: 5px solid var(--silver); }
        header h1 { font-family: 'Playfair Display', serif; font-size: 32px; letter-spacing: 4px; }

        nav { display: flex; justify-content: space-around; background: white; padding: 15px 0; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: none; border: none; color: #888; font-size: 11px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .nav-btn.active { color: var(--charcoal); font-weight: 700; border-bottom: 2px solid var(--charcoal); }
        .nav-btn i { display: block; font-size: 20px; margin-bottom: 5px; }

        main { padding: 20px; max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 2px; margin-bottom: 20px; border: 1px solid #ddd; border-top: 5px solid var(--charcoal); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 20px; color: var(--charcoal); }

        .form-group { margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #666; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; font-family: inherit; }
        .btn-main { width: 100%; padding: 15px; background: var(--charcoal); color: var(--silver); border: none; font-weight: 600; cursor: pointer; letter-spacing: 1px; }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; }
        .bar-bg { background: #eee; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .bar-fill { height: 100%; transition: width 0.8s ease; }

        .diagnosis-msg { font-size: 14px; line-height: 1.6; font-style: italic; color: #444; border-left: 3px solid var(--silver); padding-left: 15px; margin-top: 20px; }
        #balance-display { font-size: 40px; font-weight: 300; text-align: center; margin: 10px 0; font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>

<header>
    <h1>ALKARANTA</h1>
    <p style="font-size: 10px; margin-top: 5px; opacity: 0.8;">ESTÁNDAR SILVER</p>
</header>

<nav>
    <button class="nav-btn active" onclick="showPage('inicio')"><i class="fa-solid fa-chart-pie"></i>Resumen</button>
    <button class="nav-btn" onclick="showPage('add')"><i class="fa-solid fa-plus-circle"></i>Registro</button>
    <button class="nav-btn" onclick="showPage('diag')"><i class="fa-solid fa-gem"></i>Diagnóstico</button>
</nav>

<main>
    <div id="page-inicio" class="page" style="display: block;">
        <div class="card">
            <h2 class="card-title">Balance Disponible</h2>
            <div id="balance-display">$0.00</div>
        </div>
    </div>

    <div id="page-add" class="page" style="display: none;">
        <div class="card">
            <h2 class="card-title">Cargar Movimiento</h2>
            <div class="form-group">
                <label>Tipo de Flujo</label>
                <select id="tipo">
                    <option value="ingreso">Ingreso (+)</option>
                    <option value="necesidad">Egreso: Necesidad (50%)</option>
                    <option value="deseo">Egreso: Deseo (30%)</option>
                    <option value="ahorro">Egreso: Ahorro (20%)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Monto ($)</label>
                <input type="number" id="monto" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Concepto</label>
                <input type="text" id="desc" placeholder="Ej: Sueldo o Café">
            </div>
            <button class="btn-main" onclick="registrar()">REGISTRAR MOVIMIENTO</button>
        </div>
    </div>

    <div id="page-diag" class="page" style="display: none;">
        <div class="card">
            <h2 class="card-title">Diagnóstico 50/30/20</h2>
            <div id="diag-bars"></div>
            <div id="diag-text" class="diagnosis-msg">Carga datos para ver tu análisis.</div>
        </div>
    </div>
</main>

<script>
    const SHEETS_URL = "URL_DE_TU_APPS_SCRIPT_AQUI"; // Pegar aquí la URL de Google Sheets
    let datos = JSON.parse(localStorage.getItem('alkaranta_silver')) || [];

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + id).style.display = 'block';
        event.currentTarget.classList.add('active');
        actualizar();
    }

    function registrar() {
        const t = document.getElementById('tipo').value;
        const m = parseFloat(document.getElementById('monto').value);
        const d = document.getElementById('desc').value;
        if (!m) return alert("Monto inválido");

        const nuevo = { tipo: t, monto: m, desc: d, fecha: new Date().toLocaleDateString() };
        datos.push(nuevo);
        localStorage.setItem('alkaranta_silver', JSON.stringify(datos));
        
        // Limpiar
        document.getElementById('monto').value = '';
        document.getElementById('desc').value = '';
        
        alert("Registrado correctamente");
        showPage('inicio');
    }

    function actualizar() {
        let ingresos = 0, n = 0, d = 0, a = 0;
        datos.forEach(x => {
            if (x.tipo === 'ingreso') ingresos += x.monto;
            else if (x.tipo === 'necesidad') n += x.monto;
            else if (x.tipo === 'deseo') d += x.monto;
            else if (x.tipo === 'ahorro') a += x.monto;
        });

        const gastosTotal = n + d + a;
        document.getElementById('balance-display').innerText = `$${(ingresos - gastosTotal).toLocaleString()}`;

        if (ingresos > 0) {
            const pn = (n/ingresos*100).toFixed(0);
            const pd = (d/ingresos*100).toFixed(0);
            const pa = (a/ingresos*100).toFixed(0);

            document.getElementById('diag-bars').innerHTML = `
                <div class="stat-row"><span>Necesidades: ${pn}%</span><span>Meta: 50%</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width:${pn}%; background:#1a1a1a"></div></div>
                <br>
                <div class="stat-row"><span>Deseos: ${pd}%</span><span>Meta: 30%</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width:${pd}%; background:#888"></div></div>
                <br>
                <div class="stat-row"><span>Ahorro: ${pa}%</span><span>Meta: 20%</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width:${pa}%; background:#C0C0C0"></div></div>
            `;

            let msg = "";
            if (pn > 50) msg = "Tus necesidades están excedidas. Revisa tus gastos fijos.";
            else if (pd > 30) msg = "Estás gastando mucho en deseos. Controla los gastos hormiga.";
            else if (pa < 20) msg = "Debes priorizar más tu ahorro. Intenta ahorrar antes de gastar.";
            else msg = "¡Perfecto! Tus finanzas están en equilibrio Silver.";
            document.getElementById('diag-text').innerText = msg;
        }
    }
    actualizar();
</script>
</body>
</html>
