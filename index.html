<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alkaranta Finanzas</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icono-192.png">
  <link rel="apple-touch-icon" href="icono-192.png">
  <style>
    .app-header {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      flex-direction: column;
    }
    .app-header img.logo-coin {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 16px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.35));
    }
    .app-header h1 {
      margin: 0;
    }
    .app-header p {
      margin: 4px 0 0 0;
    }
  </style>
</head>
<body>

  <div class="container">
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
      <button id="btnPersonal" onclick="cambiarModo('personal')" style="flex: 1; padding: 10px; background-color: #3498db; color: white; border: none; border-radius: 5px;">Personal</button>
      <button id="btnLaboral" onclick="cambiarModo('laboral')" style="flex: 1; padding: 10px; background-color: #bdc3c7; color: white; border: none; border-radius: 5px;">Laboral</button>
    </div>

    <header class="app-header">
      <img src="icono-192.png" alt="Logo Alkaranta Finanzas" class="logo-coin">
      <div>
        <h1>Alkaranta Finanzas</h1>
        <p>Control inteligente de ingresos y egresos</p>
      </div>
    </header>

    <section class="cards">
      <div class="card card-saldo">
        <h3>Saldo Total</h3>
        <span id="saldoTotal">$0</span>
      </div>
      <div class="card card-ingresos">
        <h3>Ingresos</h3>
        <span id="totalIngresos">$0</span>
      </div>
      <div class="card card-egresos">
        <h3>Egresos</h3>
        <span id="totalEgresos">$0</span>
      </div>
    </section>

    <section class="grafico">
      <h2>Resumen Financiero</h2>
      <div class="grafico-inner">
        <canvas id="graficoTorta"></canvas>
        <canvas id="graficoBarras"></canvas>
      </div>
    </section>

    <section class="formulario">
      <h2 id="tituloFormulario">Nuevo Movimiento</h2>
      <div style="display: flex; gap: 5px; align-items: center; margin-bottom: 10px;">
        <input type="date" id="fecha" style="flex-grow: 1;">
        <button type="button" onclick="resetearFecha()" style="padding: 5px 10px;">📅 Hoy</button>
      </div>
      <select id="tipo" onchange="actualizarCategorias()">
        <option value="Ingreso">Ingreso</option>
        <option value="Egreso">Egreso</option>
      </select>
      <select id="categoria"></select>
      <input type="number" id="monto" placeholder="Monto" min="0">
      <input type="text" id="descripcion" placeholder="Descripción (opcional)">
      <div class="btn-group">
        <button id="btnGuardar" onclick="guardarMovimiento()">💾 Guardar Movimiento</button>
        <button id="btnCancelar" class="btn-cancelar" onclick="cancelarEdicion()" style="display:none">✕ Cancelar</button>
      </div>
    </section>

    <section class="filtros">
      <div class="filtros-inner">
        <select id="filtroMes" onchange="renderizar()">
          <option value="">Todos los meses</option>
        </select>
        <select id="filtroTipo" onchange="renderizar()">
          <option value="">Todos</option>
          <option value="Ingreso">Ingresos</option>
          <option value="Egreso">Egresos</option>
        </select>
        <button class="btn-export" onclick="exportarCSV()">📥 Exportar CSV</button>
      </div>
    </section>

    <section class="tabla">
      <h2>Movimientos</h2>
      <div class="tabla-scroll">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Tipo</th>
              <th>Categoría</th>
              <th>Monto</th>
              <th>Descripción</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaMovimientos"></tbody>
        </table>
      </div>
      <p id="sinMovimientos" class="sin-datos" style="display:none">No hay movimientos para mostrar.</p>
    </section>

    <section class="resumen-categorias" style="margin-top: 20px;">
      <h2>Gastos por Categoría</h2>
      <div id="listaCategorias" style="background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
      </div>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registrado correctamente'))
          .catch(err => console.log('Error al registrar el Service Worker:', err));
      });
    }
  </script>
</body>
</html>
